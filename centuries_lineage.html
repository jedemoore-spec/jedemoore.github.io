<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Century Men's Society — Family Tree</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d1b3e;
  --navy2:#0a1530;
  --navy3:#111f47;
  --white:#ffffff;
  --offwhite:#e8ecf5;
  --dim:rgba(255,255,255,0.55);
  --dimmer:rgba(255,255,255,0.3);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono:"SF Mono","Fira Mono",monospace;
}
html,body{height:100%;background:var(--navy);color:var(--white);font-family:var(--font);overflow:hidden}

/* ── Hero header ── */
#hero{
  position:relative;height:100vh;display:flex;flex-direction:column;
  background:var(--navy);overflow:hidden;
}
#hero-content{
  position:absolute;bottom:0;left:0;right:0;top:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:0 48px 48px;z-index:10;pointer-events:none;
}
#hero h1{
  font-size:clamp(36px,5vw,64px);font-weight:300;letter-spacing:-0.02em;
  color:var(--white);line-height:1.1;margin-bottom:8px;
  font-family:Georgia,serif;font-style:italic;
}
#hero p{font-size:16px;color:var(--dim);font-weight:300;letter-spacing:0.04em;text-transform:uppercase}
.hero-logo{
  position:absolute;bottom:48px;right:48px;
  font-family:Georgia,serif;font-size:64px;font-style:italic;
  color:rgba(255,255,255,0.12);font-weight:400;z-index:10;pointer-events:none;
  line-height:1;
}
#scroll-hint{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dimmer);
  z-index:10;cursor:pointer;pointer-events:all;
  animation:bounce 2s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
#scroll-hint svg{width:20px;height:20px;opacity:0.5}

/* tree SVG in hero */
#hero-tree{position:absolute;inset:0;z-index:1}

/* ── App ── */
#app{height:100vh;display:flex;flex-direction:column;position:relative}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;height:52px;z-index:100;
  background:rgba(13,27,62,0.92);backdrop-filter:blur(12px);
  border-bottom:0.5px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:12px;
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{font-family:Georgia,serif;font-style:italic;font-size:22px;color:var(--offwhite);opacity:.7}
.tb-title{font-size:14px;font-weight:400;color:var(--offwhite);letter-spacing:0.02em}
.tb-right{display:flex;align-items:center;gap:8px}
button{
  font-family:var(--font);font-size:12px;padding:5px 12px;
  border-radius:6px;border:0.5px solid rgba(255,255,255,0.2);
  background:transparent;color:var(--offwhite);cursor:pointer;
  transition:background .15s,border-color .15s;white-space:nowrap;
}
button:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.35)}
button:active{transform:scale(0.97)}
button.pri{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3)}
button.pri:hover{background:rgba(255,255,255,0.2)}
input[type=text]{
  font-family:var(--font);font-size:12px;padding:5px 11px;
  border-radius:6px;border:0.5px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.06);color:var(--white);width:160px;outline:none;
}
input[type=text]::placeholder{color:rgba(255,255,255,0.35)}
input[type=text]:focus{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.1)}

/* Canvas */
#canvas{flex:1;overflow:hidden;position:relative;cursor:grab;margin-top:52px}
#canvas.grabbing{cursor:grabbing}
#tree-svg{position:absolute;top:0;left:0;touch-action:none;user-select:none}

/* ── CSV Panel ── */
#csv-panel{
  position:absolute;top:52px;left:0;right:0;z-index:90;
  background:rgba(10,21,48,0.97);backdrop-filter:blur(16px);
  border-bottom:0.5px solid rgba(255,255,255,0.1);
  padding:18px 20px;display:none;
}
#csv-panel.open{display:block}
#csv-panel h2{font-size:13px;font-weight:500;margin-bottom:5px;color:var(--offwhite)}
#csv-panel p{font-size:12px;color:var(--dim);margin-bottom:10px;line-height:1.6}
code{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--offwhite)}
textarea{
  font-family:var(--mono);font-size:12px;width:100%;max-width:680px;height:110px;
  border:0.5px solid rgba(255,255,255,0.2);border-radius:6px;padding:9px 11px;
  background:rgba(255,255,255,0.05);color:var(--white);resize:vertical;outline:none;line-height:1.6;
}
textarea:focus{border-color:rgba(255,255,255,0.4)}
.csv-row{display:flex;gap:8px;margin-top:9px;align-items:center}
#csv-err{font-size:12px;color:#ff8080}

/* ── Edit Panel ── */
#edit-panel{
  position:absolute;top:52px;right:0;bottom:0;width:270px;
  background:rgba(10,21,48,0.97);backdrop-filter:blur(16px);
  border-left:0.5px solid rgba(255,255,255,0.1);
  z-index:95;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .22s ease;
}
#edit-panel.open{transform:none}
.ep-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid rgba(255,255,255,0.1);flex-shrink:0}
.ep-head h3{font-size:14px;font-weight:500;color:var(--offwhite);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-body{flex:1;overflow-y:auto;padding:14px 16px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--dim);margin-bottom:5px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase}
.field input[type=text]{width:100%}
.color-presets{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.cp{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s;flex-shrink:0}
.cp:hover{transform:scale(1.18)}
.cp.sel{border-color:var(--white)}
.field input[type=color]{width:100%;height:34px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);cursor:pointer;padding:3px 6px}
.avatar-row{display:flex;align-items:center;gap:10px}
#avatar-preview{width:46px;height:46px;border-radius:50%;object-fit:cover;border:0.5px solid rgba(255,255,255,0.2);display:none;flex-shrink:0}
#avatar-placeholder{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.av-btns{display:flex;flex-direction:column;gap:5px}
.ep-footer{padding:12px 16px;border-top:0.5px solid rgba(255,255,255,0.1);display:flex;gap:8px;flex-shrink:0}
.danger{color:#ff8080!important;border-color:rgba(255,128,128,0.25)!important}
.danger:hover{background:rgba(255,128,128,0.08)!important}

/* ── Node tooltip ── */
#tip{
  position:fixed;background:rgba(10,21,48,0.95);border:0.5px solid rgba(255,255,255,0.2);
  color:var(--offwhite);font-size:12px;padding:6px 10px;border-radius:6px;
  pointer-events:none;z-index:999;white-space:nowrap;display:none;
  backdrop-filter:blur(8px);
}

/* node styles in SVG */
.node-hit{cursor:pointer}
.node-hit:hover .node-ring{opacity:1!important}
</style>
</head>
<body>

<!-- LANDING PAGE -->
<div id="hero">
  <svg id="hero-tree" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
  <div id="hero-content">
    <h1>Centuries Family Tree</h1>
    <p>Tracing our lineage roots</p>
  </div>
  <div class="hero-logo">C</div>
  <div id="scroll-hint" onclick="showApp()">
    <span>View Tree</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <div id="topbar">
    <div class="tb-left">
      <span class="tb-logo">C</span>
      <span class="tb-title">Century Men's Society — Family Tree</span>
    </div>
    <div class="tb-right">
      <input type="text" id="search" placeholder="Search member…" oninput="handleSearch(this.value)"/>
      <button onclick="toggleCSV()">Edit members</button>
      <button onclick="resetLayout()">Reset layout</button>
      <button onclick="showHero()">← Back</button>
    </div>
  </div>

  <div id="csv-panel">
    <h2>Member data</h2>
    <p>One per line: <code>Member Name, Big's Name</code> — leave Big blank for founders (trunk). Optional: <code>Name, Big, Role</code></p>
    <textarea id="csv-input" spellcheck="false"></textarea>
    <div class="csv-row">
      <button class="pri" onclick="loadCSV()">Apply</button>

      <span id="csv-err"></span>
    </div>

  <div id="canvas">
    <svg id="tree-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<!-- Edit Panel -->
<div id="edit-panel">
  <div class="ep-head">
    <h3 id="ep-name">Member</h3>
    <button style="font-size:14px;padding:2px 8px" onclick="closePanel()">✕</button>
  </div>
  <div class="ep-body">
    <div class="field">

    <div class="field">

        <img id="avatar-preview" alt=""/>
        <div class="av-btns">
          <button onclick="document.getElementById('avatar-file').click()">Upload</button>
          <button class="danger" onclick="clearAvatar()">Remove</button>
        </div>

    <button class="pri" style="flex:1" onclick="closePanel()">Done</button>
    <button class="danger" onclick="resetNode()">Reset</button>
  </div>
</div>

<div id="tip"></div>

<script>
// ═══════════════════════════════════════════
// HERO TREE DRAWING
// ═══════════════════════════════════════════
function drawHeroTree(){
  const svg=document.getElementById('hero-tree');
  const W=1200,H=700;
  svg.innerHTML='';
  const ns='http://www.w3.org/2000/svg';

  function mk(tag,attrs,parent){
    const e=document.createElementNS(ns,tag);
    for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
    if(parent)parent.appendChild(e);return e;
  }

  // Background
  mk('rect',{x:0,y:0,width:W,height:H,fill:'#0d1b3e'},svg);

  // Subtle radial glow at trunk base
  const defs=mk('defs',{},svg);
  const rg=mk('radialGradient',{id:'hg',cx:'60%',cy:'90%',r:'50%',gradientUnits:'userSpaceOnUse',fx:'60%',fy:'90%'},defs);
  mk('stop',{offset:'0%','stop-color':'#1a3a6e','stop-opacity':'0.6'},rg);
  mk('stop',{offset:'100%','stop-color':'#0d1b3e','stop-opacity':'0'},rg);
  mk('rect',{x:0,y:0,width:W,height:H,fill:'url(#hg)'},svg);

  const g=mk('g',{stroke:'rgba(255,255,255,0.88)','stroke-linecap':'round','stroke-linejoin':'round',fill:'none'},svg);

  // Recursive branch generator
  const rng=mulberry32(42);
  function rand(){return rng();}

  function branch(x,y,angle,len,w,depth){
    if(depth>12||len<4)return;
    const rad=angle*Math.PI/180;
    const ex=x+Math.cos(rad)*len;
    const ey=y-Math.sin(rad)*len;
    mk('line',{x1:x,y1:y,x2:ex,y2:ey,'stroke-width':Math.max(0.4,w)},g);
    if(depth<9){
      const spread=22+rand()*18;
      const nlen=len*(0.62+rand()*0.12);
      const nw=w*0.68;
      branch(ex,ey,angle+spread*(0.7+rand()*0.6),nlen,nw,depth+1);
      branch(ex,ey,angle-spread*(0.7+rand()*0.6),nlen*0.9,nw*0.9,depth+1);
      if(depth<5&&rand()>0.5) branch(ex,ey,angle+(rand()-0.5)*12,nlen*0.7,nw*0.6,depth+2);
    } else {
      branch(ex,ey,angle+18+rand()*20,len*0.7,w*0.6,depth+1);
      branch(ex,ey,angle-18-rand()*20,len*0.7,w*0.6,depth+1);
    }
  }

  // Trunk
  const tx=720,ty=710;
  mk('line',{x1:tx,y1:ty,x2:tx,y2:ty-80,'stroke-width':22},g);
  mk('line',{x1:tx,y1:ty-60,x2:tx,y2:ty-160,'stroke-width':16},g);

  // Main branches
  branch(tx,ty-150, 90, 140, 13, 0);
  branch(tx,ty-150, 75, 120, 10, 1);
  branch(tx,ty-150,105, 110, 10, 1);
  branch(tx,ty-200, 95, 100,  9, 1);
  branch(tx,ty-180, 82, 90,   8, 2);

  // Extra roots/base sprawl
  mk('line',{x1:tx,y1:ty,x2:tx-60,y2:ty+10,'stroke-width':10,stroke:'rgba(255,255,255,0.4)'},svg);
  mk('line',{x1:tx,y1:ty,x2:tx+40,y2:ty+8,'stroke-width':8,stroke:'rgba(255,255,255,0.3)'},svg);
}

function mulberry32(a){
  return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}
}

// ═══════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════
const GEN_COLORS=['#ffffff','#b8c9f0','#8faee0','#6b91d4','#4d74c4','#3659a8','#22408a','#12296e'];
const PRESETS=['#ffffff','#b8c9f0','#ffd580','#ff9f7a','#a3e4b5','#f0a0c0','#c0a0f0','#80d4f0'];
const NS='http://www.w3.org/2000/svg';
const SK='cms_ov4',PK='cms_pos4',AK='cms_av4';

let members={},overrides={},positions={},avatars={};
let searchTerm='',selectedName=null,csvOpen=false,dragMoved=false;
let viewTX=0,viewTY=0,viewScale=1;

function persist(){try{localStorage.setItem(SK,JSON.stringify(overrides));localStorage.setItem(PK,JSON.stringify(positions));}catch(e){}}
function persistAv(){try{localStorage.setItem(AK,JSON.stringify(avatars));}catch(e){}}
function hydrate(){
  try{const d=localStorage.getItem(SK);if(d)overrides=JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem(PK);if(d)positions=JSON.parse(d);}catch(e){}
  try{const d=localStorage.getItem(AK);if(d)avatars=JSON.parse(d);}catch(e){}
}

const DEMO=`William Hartley,,Founder
James Aldrich,,Founder
Robert Chen,,Founder
Thomas Burke, William Hartley
Edward Mills, William Hartley
Charles Ford, James Aldrich
Henry Voss, James Aldrich
Daniel Park, Robert Chen
Samuel Osei, Robert Chen
Marcus Webb, Thomas Burke
Leo Nguyen, Thomas Burke
Aaron Grant, Edward Mills
Kevin Tran, Charles Ford
Oliver Reyes, Henry Voss
Nathan Kim, Daniel Park
Ethan Torres, Samuel Osei
Caleb Ross, Marcus Webb
Jordan Lee, Leo Nguyen
Tyler Cho, Aaron Grant
Ryan Patel, Kevin Tran
Zach Turner, Oliver Reyes
Dylan Flores, Nathan Kim
Luke Morgan, Ethan Torres`;

function toggleCSV(){csvOpen=!csvOpen;document.getElementById('csv-panel').classList.toggle('open',csvOpen);}
function loadDemo(){document.getElementById('csv-input').value=DEMO;loadCSV();}

function loadCSV(){
  const raw=document.getElementById('csv-input').value.trim();
  const err=document.getElementById('csv-err');err.textContent='';
  if(!raw){err.textContent='Please enter member data.';return;}
  const nm={};
  for(const line of raw.split('\n').map(s=>s.trim()).filter(Boolean)){
    const parts=line.split(',').map(s=>s.trim());
    const name=parts[0],big=parts[1]||null,role=parts[2]||null;
    if(!name)continue;
    nm[name]={name,big:big||null,littles:[],csvRole:role,depth:0};
  }
  let warn=null;
  for(const[n,m]of Object.entries(nm)){
    if(m.big&&nm[m.big])nm[m.big].littles.push(n);
    else if(m.big){warn=`"${m.big}" not found — treating "${n}" as founder.`;m.big=null;}
  }
  // compute depths
  function setDepth(name,d){nm[name].depth=d;for(const l of nm[name].littles)setDepth(l,d+1);}
  for(const[n,m]of Object.entries(nm))if(!m.big)setDepth(n,0);
  if(warn)err.textContent='⚠ '+warn;
  members=nm;
  for(const k of Object.keys(positions))if(!members[k])delete positions[k];
  renderTree();
  fitView();
}

// ═══════════════════════════════════════════
// LAYOUT — bottom-up organic tree
// ═══════════════════════════════════════════
const R=28; // node radius
const LEVEL_H=130; // vertical spacing per generation
const SIBLING_GAP=80;

function subTreeWidth(name){
  const m=members[name];
  if(!m.littles.length)return R*2+SIBLING_GAP;
  return Math.max(R*2+SIBLING_GAP, m.littles.map(subTreeWidth).reduce((a,b)=>a+b,0));
}

function autoLayout(name,x,y,out){
  const m=members[name];
  out[name]={ax:x,ay:y,depth:m.depth};
  if(!m.littles.length)return;
  const totalW=m.littles.map(subTreeWidth).reduce((a,b)=>a+b,0);
  let cx=x-totalW/2;
  for(const l of m.littles){
    const sw=subTreeWidth(l);
    autoLayout(l,cx+sw/2,y-LEVEL_H,out);
    cx+=sw;
  }
}

function getMaxDepth(){
  let mx=0;
  for(const m of Object.values(members))mx=Math.max(mx,m.depth);
  return mx;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function mk(tag,attrs,parent){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  if(parent)parent.appendChild(e);return e;
}

function lum(hex){
  if(!hex||hex.length<7)return 200;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 0.299*r+0.587*g+0.114*b;
}

function renderTree(){
  const svg=document.getElementById('tree-svg');
  svg.innerHTML='';
  const keys=Object.keys(members);
  if(!keys.length)return;

  const maxD=getMaxDepth();

  // auto-layout
  const auto={};
  const roots=Object.values(members).filter(m=>!m.big||!members[m.big]);
  const TREE_GAP=220;
  let totalRootW=roots.map(r=>subTreeWidth(r.name)).reduce((a,b)=>a+b,0)+(roots.length-1)*TREE_GAP;
  let rx= -totalRootW/2;
  const baseY=0;
  for(const r of roots){
    const sw=subTreeWidth(r.name);
    autoLayout(r.name,rx+sw/2,baseY,auto);
    rx+=sw+TREE_GAP;
  }

  // merge with manual
  const pos={};
  for(const k of keys){
    const a=auto[k]||{ax:0,ay:0,depth:0};
    pos[k]=positions[k]?{x:positions[k].x,y:positions[k].y,depth:a.depth}:{x:a.ax,y:a.ay,depth:a.depth};
  }

  const allX=Object.values(pos).map(p=>p.x);
  const allY=Object.values(pos).map(p=>p.y);
  const minX=Math.min(...allX)-80,maxX=Math.max(...allX)+80;
  const minY=Math.min(...allY)-80,maxY=Math.max(...allY)+80;
  const svgW=maxX-minX,svgH=maxY-minY;

  svg.setAttribute('width',svgW);
  svg.setAttribute('height',svgH);
  svg.setAttribute('viewBox',`${minX} ${minY} ${svgW} ${svgH}`);
  svg.style.background='var(--navy)';

  // subtle radial glow at base
  const defs=mk('defs',{},svg);
  const rg=mk('radialGradient',{id:'bg',cx:'50%',cy:'100%',r:'55%',gradientUnits:'userSpaceOnUse',
    fx:`${(minX+maxX)/2}`,fy:`${maxY}`},defs);
  mk('stop',{offset:'0%','stop-color':'#1a3a6e','stop-opacity':'0.7'},rg);
  mk('stop',{offset:'100%','stop-color':'#0d1b3e','stop-opacity':'0'},rg);
  mk('rect',{x:minX,y:minY,width:svgW,height:svgH,fill:'url(#bg)'},svg);

  // clip paths for avatars
  for(const name of keys){
    if(!avatars[name])continue;
    const p=pos[name];
    const cp=mk('clipPath',{id:'cl'+safeId(name)},defs);
    mk('circle',{cx:p.x,cy:p.y,r:R-1},cp);
  }

  // ── Branch lines (organic curved paths) ──
  const branchG=mk('g',{'stroke-linecap':'round','stroke-linejoin':'round',fill:'none'},svg);

  for(const[name,p]of Object.entries(pos)){
    const m=members[name];
    if(!m.littles.length)continue;
    const d=p.depth;
    // Trunk-like thickness decreases as we go up
    const strokeW=Math.max(1, 9 - d*1.4);
    const strokeColor=`rgba(255,255,255,${Math.max(0.25, 0.85-d*0.07)})`;

    for(const lname of m.littles){
      const cp=pos[lname];if(!cp)continue;
      // organic bezier: control points slightly spread
      const cp1x=p.x+(cp.x-p.x)*0.15+(Math.random()-0.5)*20;
      const cp1y=p.y+(cp.y-p.y)*0.45;
      const cp2x=cp.x+(p.x-cp.x)*0.15+(Math.random()-0.5)*20;
      const cp2y=cp.y+(p.y-cp.y)*0.45;
      mk('path',{
        d:`M${p.x},${p.y} C${cp1x},${cp1y} ${cp2x},${cp2y} ${cp.x},${cp.y}`,
        stroke:strokeColor,'stroke-width':strokeW
      },branchG);
    }
  }

  // ── Nodes ──
  const nodeG=mk('g',{},svg);

  for(const[name,p]of Object.entries(pos)){
    const ov=overrides[name]||{};
    const m=members[name];
    const d=p.depth;
    const ci=Math.min(d,GEN_COLORS.length-1);
    const fillColor=ov.color||GEN_COLORS[ci];
    const isFounder=!m.big||!members[m.big];
    const nodeR=isFounder?R+4:R;
    const dimmed=searchTerm&&!name.toLowerCase().includes(searchTerm.toLowerCase());
    const sel=name===selectedName;
    const av=avatars[name];
    const role=ov.role||m.csvRole||null;

    const g=mk('g',{'data-name':name,opacity:dimmed?'0.18':'1',class:'node-hit'},nodeG);

    // outer glow ring for founders
    if(isFounder){
      mk('circle',{cx:p.x,cy:p.y,r:nodeR+7,fill:'none',
        stroke:'rgba(255,255,255,0.15)','stroke-width':'1.5'},g);
    }

    // selection ring
    if(sel){
      mk('circle',{cx:p.x,cy:p.y,r:nodeR+5,fill:'none',
        stroke:'rgba(255,255,255,0.7)','stroke-width':'2'},g);
    }

    // hover ring (shown via CSS class)
    const ring=mk('circle',{cx:p.x,cy:p.y,r:nodeR+4,fill:'none',
      stroke:'rgba(255,255,255,0.4)','stroke-width':'1.5',class:'node-ring',opacity:'0'},g);

    // main circle
    mk('circle',{cx:p.x,cy:p.y,r:nodeR,fill:fillColor,stroke:'rgba(255,255,255,0.35)','stroke-width':'1'},g);

    // avatar image
    if(av){
      mk('image',{href:av,x:p.x-nodeR+1,y:p.y-nodeR+1,width:(nodeR-1)*2,height:(nodeR-1)*2,
        'clip-path':`url(#cl${safeId(name)})`},g);
    }

    // name label below node
    const textY=p.y+nodeR+14;
    const txtFill=d===0?'rgba(255,255,255,0.95)':'rgba(255,255,255,0.8)';
    const fw=d===0?'500':'400';
    const fs=d===0?'12':'11';
    const label=name.length>18?name.slice(0,17)+'…':name;
    mk('text',{x:p.x,y:textY,'text-anchor':'middle','dominant-baseline':'hanging',
      'font-size':fs,'font-weight':fw,fill:txtFill},g).textContent=label;
    if(role){
      mk('text',{x:p.x,y:textY+14,'text-anchor':'middle','dominant-baseline':'hanging',
        'font-size':'10','font-weight':'400',fill:'rgba(255,255,255,0.45)'},g).textContent=role;
    }

    // events
    g.addEventListener('click',()=>{if(!dragMoved)openPanel(name);});
    g.addEventListener('mouseenter',()=>showTip(name));
    g.addEventListener('mouseleave',hideTip);
    g.addEventListener('mousedown',e=>initDrag(e,name,p));
    g.addEventListener('touchstart',e=>initDragTouch(e,name,p),{passive:false});
  }

  applyTransform();
}

function safeId(n){return n.replace(/[^a-z0-9]/gi,'_');}

// ═══════════════════════════════════════════
// PAN + ZOOM
// ═══════════════════════════════════════════
function applyTransform(){
  document.getElementById('tree-svg').style.transform=
    `translate(${viewTX}px,${viewTY}px) scale(${viewScale})`;
}

function fitView(){
  const svg=document.getElementById('tree-svg');
  const canvas=document.getElementById('canvas');
  if(!svg.getAttribute('width'))return;
  const cw=canvas.clientWidth,ch=canvas.clientHeight;
  const sw=parseFloat(svg.getAttribute('width')),sh=parseFloat(svg.getAttribute('height'));
  const scale=Math.min(0.95,Math.min(cw/sw,ch/sh)*0.85);
  viewScale=scale;
  viewTX=(cw-sw*scale)/2;
  viewTY=(ch-sh*scale)/2;
  applyTransform();
}

// Pan
let panState=null;
document.getElementById('canvas').addEventListener('mousedown',e=>{
  if(e.target.closest('.node-hit'))return;
  panState={x:e.clientX,y:e.clientY,tx:viewTX,ty:viewTY};
  document.getElementById('canvas').classList.add('grabbing');
});
document.addEventListener('mousemove',e=>{
  if(!panState)return;
  viewTX=panState.tx+(e.clientX-panState.x);
  viewTY=panState.ty+(e.clientY-panState.y);
  applyTransform();
});
document.addEventListener('mouseup',()=>{panState=null;document.getElementById('canvas').classList.remove('grabbing');});

// Scroll zoom
document.getElementById('canvas').addEventListener('wheel',e=>{
  e.preventDefault();
  const canvas=document.getElementById('canvas');
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const factor=e.deltaY<0?1.1:0.9;
  const newScale=Math.min(4,Math.max(0.1,viewScale*factor));
  viewTX=mx-(mx-viewTX)*newScale/viewScale;
  viewTY=my-(my-viewTY)*newScale/viewScale;
  viewScale=newScale;
  applyTransform();
},{passive:false});

// Pinch zoom
let lastPinchDist=null;
document.getElementById('canvas').addEventListener('touchmove',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(lastPinchDist){
      const factor=dist/lastPinchDist;
      viewScale=Math.min(4,Math.max(0.1,viewScale*factor));
      applyTransform();
    }
    lastPinchDist=dist;
  }
},{passive:false});
document.getElementById('canvas').addEventListener('touchend',()=>{lastPinchDist=null;});

// ═══════════════════════════════════════════
// DRAG NODES
// ═══════════════════════════════════════════
function initDrag(e,name,p){
  e.stopPropagation();dragMoved=false;
  const ox=p.x,oy=p.y,x0=e.clientX,y0=e.clientY;
  function mv(ev){
    const dx=(ev.clientX-x0)/viewScale,dy=(ev.clientY-y0)/viewScale;
    if(Math.abs(dx)>3||Math.abs(dy)>3)dragMoved=true;
    if(!dragMoved)return;
    positions[name]={x:ox+dx,y:oy+dy};
    persist();renderTree();
  }
  function up(){document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);}
  document.addEventListener('mousemove',mv);
  document.addEventListener('mouseup',up);
}
function initDragTouch(e,name,p){
  if(e.touches.length>1)return;
  e.preventDefault();dragMoved=false;
  const t=e.touches[0],ox=p.x,oy=p.y,x0=t.clientX,y0=t.clientY;
  function mv(ev){
    const tt=ev.touches[0];
    const dx=(tt.clientX-x0)/viewScale,dy=(tt.clientY-y0)/viewScale;
    if(Math.abs(dx)>4||Math.abs(dy)>4)dragMoved=true;
    if(!dragMoved)return;
    positions[name]={x:ox+dx,y:oy+dy};
    persist();renderTree();
  }
  function up(){document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);}
  document.addEventListener('touchmove',mv,{passive:false});
  document.addEventListener('touchend',up);
}

// ═══════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════
function showTip(name){
  const m=members[name];if(!m)return;
  const ov=overrides[name]||{};
  const role=ov.role||m.csvRole;
  const tip=document.getElementById('tip');
  tip.textContent=name+(role?' — '+role:'')+((!m.big||!members[m.big])?' · Founder':'');
  tip.style.display='block';
}
function hideTip(){document.getElementById('tip').style.display='none';}
document.addEventListener('mousemove',e=>{
  const tip=document.getElementById('tip');
  if(tip.style.display==='block'){tip.style.left=e.clientX+14+'px';tip.style.top=e.clientY-8+'px';}
});

// ═══════════════════════════════════════════
// EDIT PANEL
// ═══════════════════════════════════════════
function buildPanel(){
  const cp=document.getElementById('color-presets');cp.innerHTML='';
  for(const c of PRESETS){
    const d=document.createElement('div');d.className='cp';d.style.background=c;d.dataset.color=c;
    d.onclick=()=>{liveUpdate('color',c);document.getElementById('ep-color').value=c;syncPanel();};
    cp.appendChild(d);
  }
}

function openPanel(name){
  selectedName=name;
  document.getElementById('ep-name').textContent=name;
  syncPanel();
  document.getElementById('edit-panel').classList.add('open');
  renderTree();
}

function syncPanel(){
  if(!selectedName)return;
  const ov=overrides[selectedName]||{};
  const m=members[selectedName];
  document.getElementById('ep-role').value=ov.role||m?.csvRole||'';
  const ci=Math.min(m?.depth||0,GEN_COLORS.length-1);
  const col=ov.color||GEN_COLORS[ci];
  document.getElementById('ep-color').value=col;
  document.querySelectorAll('.cp').forEach(d=>d.classList.toggle('sel',d.dataset.color===(ov.color||'')));
  const av=avatars[selectedName];
  document.getElementById('avatar-preview').src=av||'';
  document.getElementById('avatar-preview').style.display=av?'block':'none';
  document.getElementById('avatar-placeholder').style.display=av?'none':'flex';
}

function closePanel(){
  document.getElementById('edit-panel').classList.remove('open');
  selectedName=null;renderTree();
}

function liveUpdate(key,val){
  if(!selectedName)return;
  if(!overrides[selectedName])overrides[selectedName]={};
  overrides[selectedName][key]=val;
  persist();renderTree();
}

function resetNode(){
  if(!selectedName)return;
  delete overrides[selectedName];delete positions[selectedName];delete avatars[selectedName];
  persist();persistAv();syncPanel();renderTree();
}

function handleAvatar(e){
  const file=e.target.files[0];if(!file||!selectedName)return;
  const reader=new FileReader();
  reader.onload=ev=>{avatars[selectedName]=ev.target.result;persistAv();syncPanel();renderTree();};
  reader.readAsDataURL(file);e.target.value='';
}
function clearAvatar(){if(!selectedName)return;delete avatars[selectedName];persistAv();syncPanel();renderTree();}

// ═══════════════════════════════════════════
// SEARCH / RESET
// ═══════════════════════════════════════════
function handleSearch(v){searchTerm=v.trim();renderTree();}
function resetLayout(){positions={};persist();renderTree();fitView();}

// ═══════════════════════════════════════════
// HERO / APP SWITCHING
// ═══════════════════════════════════════════
function showApp(){
  document.getElementById('hero').style.display='none';
  document.getElementById('app').style.display='flex';
  // Load default data if empty
  if(!Object.keys(members).length){
    document.getElementById('csv-input').value=DEMO;
    loadCSV();
  } else {
    renderTree();fitView();
  }
}
function showHero(){
  document.getElementById('app').style.display='none';
  document.getElementById('hero').style.display='flex';
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
hydrate();
buildPanel();
drawHeroTree();
document.getElementById('csv-input').value=DEMO;
</script>
